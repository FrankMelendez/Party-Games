<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Impostor | Mystery Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css"> 
    <style>
        :root {
            --blood: #8B0000;
            --gold: #C9A84C;
            --ink: #12121A;
            --mist: #1E1E2E;
            --pale: #E8E0D0;
        }

        body {
            background: var(--ink);
            color: var(--pale);
            font-family: 'Cormorant Garamond', serif;
        }

        .panel-mystery {
            background: #0a0a0f;
            border: 1px solid rgba(201,168,76,0.3);
            padding: 2rem;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            border-radius: 4px;
        }

        h1 { font-family: 'Cinzel Decorative', cursive; color: var(--gold); }
        
        /* Asegura que el contenedor de la lista no rompa el diseño */
        #lista-check {
            text-align: left;
            margin: 1rem 0;
            max-height: 200px; /* Un poco más de espacio */
            overflow-y: auto;
            background: rgba(0,0,0,0.4);
            padding: 15px;
            border: 1px solid rgba(201,168,76,0.2);
            display: flex;
            flex-direction: column; /* Alinea los elementos uno debajo de otro */
            gap: 10px;
        }

        /* Estilo para cada fila de jugador */
        .player-row {
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            white-space: nowrap; /* ¡IMPORTANTE! Evita que el nombre se parta en dos */
            padding: 5px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .player-row:hover {
            background: rgba(201,168,76,0.1);
        }

        .player-row input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: var(--gold); /* Color del check acorde a tu tema */
            cursor: pointer;
        }

        .player-row span {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem;
            color: var(--pale);
        }

        .cat-chip {
            background: var(--mist);
            border: 1px solid rgba(201,168,76,0.2);
            color: var(--pale);
            padding: 8px 15px;
            margin: 5px;
            cursor: pointer;
            transition: 0.3s;
            display: inline-block;
            font-size: 0.9rem;
            border-radius: 4px;
        }

        .cat-chip.selected {
            background: rgba(139,0,0,0.3);
            border-color: var(--gold);
            box-shadow: 0 0 10px rgba(201,168,76,0.2);
            color: var(--gold);
        }

        .card-container { perspective: 1000px; margin: 2rem auto; width: 220px; height: 300px; }
        .card-inner {
            position: relative; width: 100%; height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
        }
        .card-inner.flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 1px solid var(--gold); border-radius: 10px;
        }
        .card-back {
            background: var(--ink);
            box-shadow: inset 0 0 30px rgba(201,168,76,0.1);
        }
        .card-front {
            background: var(--mist);
            transform: rotateY(180deg);
            padding: 1.5rem;
            text-align: center;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }
        .card-front.impostor-bg {
            background: linear-gradient(145deg, #1a0505, #2d0808);
            border-color: var(--blood);
        }
        
    </style>
</head>
<body onload="verificarLogin(); prepararLobby()">

<header>
    <button class="btn-logout" style="background: #334155;" onclick="window.location.href='../APP/menu.html'">⬅ Volver</button>
    <button class="btn-logout" onclick="logout()">Salir</button>
</header>

<main class="container">
    <div class="panel-mystery">
        
        <div id="screen-setup" class="screen active">
            <h1>El Impostor</h1>
            <p style="font-style: italic; opacity: 0.7; margin-bottom: 1.5rem;">Descubre quién oculta la verdad</p>
            
            <label style="color: var(--gold); font-size: 0.8rem; letter-spacing: 1px; text-transform: uppercase;">1. Elige Categorías</label>
            <div id="category-chips" style="margin: 1rem 0;">
                </div>

            <label style="color: var(--gold); font-size: 0.8rem; letter-spacing: 1px; text-transform: uppercase;">2. Selecciona Jugadores</label>
            <div id="lista-check" style="text-align: left; margin: 1rem 0; max-height: 180px; overflow-y: auto; background: rgba(0,0,0,0.3); padding: 10px; border: 1px solid rgba(201,168,76,0.1);">
                </div>

            <button class="btn" onclick="startGame()">⚔ COMENZAR PARTIDA</button>
        </div>

        <div id="screen-card" class="screen" style="display:none;">
            <p id="player-turn-name" style="font-family: 'Cinzel Decorative'; color: var(--gold); font-size: 1.5rem; margin-bottom: 0.5rem;"></p>
            <p style="font-size: 0.8rem; opacity: 0.6; margin-bottom: 1rem;">Toca la carta para ver tu secreto</p>
            
            <div class="card-container" onclick="flipCard()">
                <div id="mystery-card" class="card-inner">
                    <div class="card-face card-back">
                        <span style="font-size: 4rem; color: var(--gold); opacity: 0.2;">✦</span>
                        <p style="font-size: 0.65rem; letter-spacing: 2px; color: var(--gold);">REVELAR</p>
                    </div>
                    <div id="card-front-face" class="card-face card-front">
                        <p id="role-label" style="text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2px;"></p>
                        <h2 id="word-display" style="font-family: 'Cinzel Decorative'; margin: 1rem 0; font-size: 1.8rem;"></h2>
                    </div>
                </div>
            </div>
            <button id="btn-next-player" class="btn" style="display:none;" onclick="nextStep()">Siguiente Jugador →</button>
        </div>

        <div id="screen-play" class="screen" style="display:none;">
            <h1>¡Debatan!</h1>
            <p id="info-partida" style="color: var(--gold); margin: 1rem 0; font-weight: bold;"></p>
            <p style="line-height: 1.6; opacity: 0.8;">Hagan preguntas por turnos. El impostor debe fingir que conoce la palabra.</p>
            
            <button class="btn" onclick="playAgain()">🔀 Nueva Ronda (Misma Categoría)</button>
            <button class="btn secondary" style="background:none; border:none; color: var(--gold); margin-top:1.5rem; cursor:pointer;" onclick="location.reload()">↺ Cambiar Ajustes</button>
        </div>

    </div>
</main>

<script src="../auth.js"></script>
<script>
// Categorías con palabras muy conocidas
const CATEGORIES = {
    "Países": ["España", "México", "Argentina", "Estados Unidos", "Francia", "Italia", "Japón", "Brasil", "Egipto", "China"],
    "Culturas": ["Egipcia", "Romana", "Maya", "Griega", "Vikinga", "Samurái", "Inca", "China", "Azteca"],
    "Deportes": ["Fútbol", "Baloncesto", "Tenis", "Natación", "Boxeo", "Voleibol", "Ciclismo", "Atletismo"],
    "Animales": ["León", "Elefante", "Tiburón", "Águila", "Jirafa", "Cocodrilo", "Oso Panda", "Caballo"],
    "Comida": ["Pizza", "Sushi", "Hamburguesa", "Tacos", "Helado", "Pasta", "Paella", "Hot Dog"],
    "Películas": ["Titanic", "Harry Potter", "Star Wars", "Avengers", "El Rey León", "Shrek", "Avatar", "Batman"],
    "Objetos": ["Celular", "Computadora", "Reloj", "Llave", "Mochila", "Guitarra", "Cámara", "Libro"]
};

let gameState = { players: [], pool: [], word: "", impostorIdx: -1, current: 0, catNombre: "" };

function prepararLobby() {
    const catWrap = document.getElementById('category-chips');
    Object.keys(CATEGORIES).forEach(cat => {
        const btn = document.createElement('div');
        btn.className = 'cat-chip';
        btn.textContent = cat;
        btn.onclick = () => btn.classList.toggle('selected');
        catWrap.appendChild(btn);
    });

    const amigos = JSON.parse(localStorage.getItem("jugadores")) || [];
    const listWrap = document.getElementById('lista-check');
    listWrap.innerHTML = ""; // Limpiar antes de llenar

    if(amigos.length === 0) {
        listWrap.innerHTML = "<p style='opacity:0.5;'>No hay amigos registrados.</p>";
    } else {
        amigos.forEach(nom => {
            // Creamos una estructura más limpia y robusta
            const label = document.createElement("label");
            label.className = "player-row";
            label.innerHTML = `
                <input type="checkbox" checked value="${nom}">
                <span>${nom}</span>
            `;
            listWrap.appendChild(label);
        });
    }
}

function startGame() {
    const checks = document.querySelectorAll('#lista-check input:checked');
    const selectedPlayers = Array.from(checks).map(c => c.value);
    
    const selectedChips = document.querySelectorAll('.cat-chip.selected');
    const selectedCats = Array.from(selectedChips).map(c => c.textContent);
    
    let pool = [];
    selectedCats.forEach(c => pool.push(...CATEGORIES[c]));

    if (selectedPlayers.length < 3) {
        alert("Necesitas al menos 3 jugadores.");
        return;
    }
    if (pool.length === 0) {
        alert("Selecciona al menos una categoría.");
        return;
    }

    gameState.players = selectedPlayers;
    gameState.pool = pool;
    gameState.catNombre = selectedCats.join(", ");
    initRound();
}

function initRound() {
    gameState.word = gameState.pool[Math.floor(Math.random() * gameState.pool.length)];
    gameState.impostorIdx = Math.floor(Math.random() * gameState.players.length);
    gameState.current = 0;

    document.getElementById('info-partida').innerText = `Mazo: ${gameState.catNombre}`;
    showScreen('screen-card');
    updateTurnUI();
}

function playAgain() {
    // Mantiene los mismos jugadores y el mismo mazo de palabras
    initRound();
}

function updateTurnUI() {
    // Actualizamos el nombre del jugador que debe sostener el teléfono
    document.getElementById('player-turn-name').textContent = gameState.players[gameState.current];
    
    const front = document.getElementById('card-front-face');
    const role = document.getElementById('role-label');
    const word = document.getElementById('word-display');

    // Resetear estilos antes de asignar nuevos para evitar el destello rojo
    front.classList.remove('impostor-bg');

    if (gameState.current === gameState.impostorIdx) {
        front.classList.add('impostor-bg');
        role.textContent = "☠ Eres el Impostor";
        role.style.color = "var(--blood)";
        word.textContent = "???";
        word.style.color = "var(--blood)";
    } else {
        role.textContent = "✦ Ciudadano";
        role.style.color = "rgba(232,224,208,0.6)";
        word.textContent = gameState.word;
        word.style.color = "var(--gold)";
    }
}

function flipCard() {
    document.getElementById('mystery-card').classList.add('flipped');
    document.getElementById('btn-next-player').style.display = 'block';
}

function nextStep() {
    // 1. Cerramos la carta e ocultamos el botón inmediatamente
    document.getElementById('mystery-card').classList.remove('flipped');
    document.getElementById('btn-next-player').style.display = 'none';

    // 2. Esperamos 600ms (lo que tarda el giro en el CSS) para cambiar los datos
    setTimeout(() => {
        gameState.current++;
        
        if (gameState.current < gameState.players.length) {
            updateTurnUI(); // Cambiamos el contenido recién cuando la carta está de espaldas
        } else {
            showScreen('screen-play');
        }
    }, 600); 
}

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
    document.getElementById(id).style.display = 'block';
}
</script>
</body>
</html>
