<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Party Games | Jugadores</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body onload="verificarLogin(); cargarJugadores()">

<header>
    <button class="btn-logout" style="background: #334155;" onclick="window.location.href='menu.html'">⬅ Volver</button>
    <button class="btn-logout" onclick="logout()">Salir</button>
</header>

<main class="container">
    <h1>👥 Amigos</h1>
    
    <div class="card-login" style="margin-bottom: 2rem;">
        <div class="input-group">
            <input id="nombreJugador" type="text" placeholder="Nombre del amigo..." maxlength="15">
        </div>
        <button onclick="agregarJugador()">+ Agregar a la lista</button>
    </div>

    <ul id="lista" class="player-list"></ul>
</main>

<script src="../auth.js"></script>
<script src="jugadores.js"></script>

</body>
</html>
